<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600&amp;display=swap');
      .logo-text {
        font-family: 'Fredoka', sans-serif;
        font-size: 56px;
        fill: #FFE66D;
      }
    </style>
    <linearGradient id="feather-grad" x1="0%" y1="90%" x2="100%" y2="10%">
      <stop offset="0%" stop-color="#C61A09" />
      <stop offset="45%" stop-color="#E23E1A" />
      <stop offset="75%" stop-color="#F28E2B" />
      <stop offset="100%" stop-color="#F8D12F" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 0)">
    <!-- Text: 'rico' -->
    <text x="10" y="85" class="logo-text">rico</text>

    <!-- Text: 'pollo' -->
    <text x="80" y="155" class="logo-text">pollo</text>

    <!-- Feathers Group -->
    <g transform="translate(155, 10)">
      <!-- Feather 1 (Up-Left) -->
      <path d="M 12 110 C -5 70, -2 40, 42 12 C 30 45, 30 75, 12 110 Z" fill="url(#feather-grad)" />
      
      <!-- Feather 2 (Up-Right) -->
      <path d="M 16 105 C 32 60, 52 32, 92 10 C 65 42, 58 72, 16 105 Z" fill="url(#feather-grad)" />
      
      <!-- Feather 3 (Mid-Right) -->
      <path d="M 18 108 C 45 80, 80 62, 108 55 C 80 75, 60 95, 18 108 Z" fill="url(#feather-grad)" />
      
      <!-- Feather 4 (Down-Right) -->
      <path d="M 18 112 C 45 100, 82 98, 98 115 C 72 125, 48 128, 18 112 Z" fill="url(#feather-grad)" />
    </g>
  </g>
</svg>
